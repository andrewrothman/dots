## General Options

# advertise 256-color support to programs running inside tmux (e.g. neovim)
set -g default-terminal "tmux-256color"

# enable mouse support for scrolling, clicking, and resizing panes
set -g mouse on

# eliminate delay when pressing <esc> - useful for neo(vim)
set -sg escape-time 0

# renumber windows sequentially when one is closed (avoids gaps e.g. 1, 3, 4)
set -g renumber-windows on

# pass focus events through to programs - required for neovim's autoread / vim-signify
set -g focus-events on

# start window numbering at 1 (default is 0)
set -g base-index 1

# start pane numbering at 1 to match windows (default is 0)
setw -g pane-base-index 1

# when session is destroyed, switch to another session instead of detaching (default: on)
set -g detach-on-destroy off

# use vi keys in copy mode (e.g. j/k to scroll, w/b for word movement)
setw -g mode-keys vi

## Command Aliases

set -s command-alias[0] reload-config='run-shell "tmux source-file ~/.config/tmux/tmux.conf && tmux display-message \"Configuration reloaded\""'
set -s command-alias[1] swap-prev='run-shell "tmux swap-window -t -1 && tmux previous-window"'
set -s command-alias[2] swap-next='run-shell "tmux swap-window -t +1 && tmux next-window"'

## Key Bindings

# change prefix to Ctrl+Space
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

# switch panes with Prefix+arrow
bind Left select-pane -L
bind Down select-pane -D
bind Up select-pane -U
bind Right select-pane -R

# switch panes with Prefix+h/j/k/l
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# resize panes with Prefix+Alt+arrow
bind M-Left  resize-pane -L 5
bind M-Down  resize-pane -D 5
bind M-Up    resize-pane -U 5
bind M-Right resize-pane -R 5

# resize panes with Prefix+Alt+h/j/k/l
bind M-h resize-pane -L 5
bind M-j resize-pane -D 5
bind M-k resize-pane -U 5
bind M-l resize-pane -R 5

# split pane in current directory, | for vertical split, - for horizontal
bind '|' split-window -h -c "#{pane_current_path}"
bind '-' split-window -v -c "#{pane_current_path}"

# switch windows with Prefix+Shift+h/l or Prefix+Shift+arrow
bind H previous-window
bind L next-window
bind S-Left previous-window
bind S-Right next-window

# new window in current pane's directory
bind C new-window -c "#{pane_current_path}"

# rename window from scratch
bind ',' command-prompt "rename-window '%%'"

# swap window positions
bind -r < swap-prev
bind -r > swap-next

# kill pane, window, session
bind x confirm-before -p "kill pane? (y/n)" kill-pane
bind X confirm-before -p "kill window? (y/n)" kill-window
bind M-x confirm-before -p "kill session? (y/n)" kill-session

# vi-style copy mode: v to select, C-v for block, y to yank
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# reload config with Prefix r
bind r reload-config

# open session picker sorted by name (overrides default 's' binding)
# bind -T prefix s choose-tree -sOname

## Appearance

# 24hr clock
setw -g clock-mode-style 24

